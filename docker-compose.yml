version: "1.0"

services:
  redis:
    image: redis:latest
    container_name: pollux_redis
    ports:
      - "5031:6379"
    networks:
      - pollux_network
    restart: unless-stopped

  postgres:
    image: postgres:15
    container_name: pollux_postgres
    environment:
      POSTGRES_USER: pollux_user
      POSTGRES_PASSWORD: pollux_pass
      POSTGRES_DB: pollux_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - pollux_network
    restart: unless-stopped

  fastapi_pollux:
    build: .
    image: fastapi_pollux
    container_name: pollux_backend_container
    ports:
      - "9004:8000"
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads
    depends_on:
      - redis
      - postgres
    networks:
      - pollux_network
    restart: unless-stopped

networks:
  pollux_network:
    driver: bridge

volumes:
  postgres_data: